<style>
        body {
            background-color: #0A0A0A;
            color: #e5e2e1;
            font-family: 'Inter', sans-serif;
        }
        .pin-dot {
            width: 14px;
            height: 14px;
            border-radius: 9999px;
            border: 2px solid #333333;
            transition: all 0.2s ease-in-out;
        }
        .pin-dot.filled {
            background-color: #ffffff;
            border-color: #ffffff;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
        }
        .keypad-button {
            background-color: #1E1E1E;
            transition: transform 0.1s active, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .keypad-button:active {
            background-color: #1a73e8;
            transform: scale(0.92);
        }
    </style>

<body class="flex flex-col items-center justify-center min-h-screen p-margin-mobile overflow-hidden">
<!-- Login Context Header -->
<div class="flex flex-col items-center text-center space-y-lg mb-xl w-full max-w-[390px]">
<!-- Brand Shell (TopAppBar Concept mapped to Login) -->
<div class="flex items-center space-x-base mb-sm">
<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary tracking-tight">DatalakeGuard</span>
</div>
<div class="space-y-sm">
<h1 class="font-headline-lg text-white">Enter Admin PIN</h1>
<p class="font-body-md text-on-surface-variant opacity-80">Security clearance level 4 required</p>
</div>
<!-- PIN Status Dots -->
<div class="flex space-x-md py-lg" id="pin-container">
<div class="pin-dot filled"></div>
<div class="pin-dot filled"></div>
<div class="pin-dot"></div>
<div class="pin-dot"></div>
</div>
</div>
<!-- PIN Pad Grid -->
<div class="grid grid-cols-3 gap-lg w-full max-w-[320px] mx-auto">
<!-- Numbers 1-9 -->
<button class="keypad-button h-[72px] w-[72px] rounded-full text-white font-title-md mx-auto" onclick="pressKey('1')">1</button>
<button class="keypad-button h-[72px] w-[72px] rounded-full text-white font-title-md mx-auto" onclick="pressKey('2')">2</button>
<button class="keypad-button h-[72px] w-[72px] rounded-full text-white font-title-md mx-auto" onclick="pressKey('3')">3</button>
<button class="keypad-button h-[72px] w-[72px] rounded-full text-white font-title-md mx-auto" onclick="pressKey('4')">4</button>
<button class="keypad-button h-[72px] w-[72px] rounded-full text-white font-title-md mx-auto" onclick="pressKey('5')">5</button>
<button class="keypad-button h-[72px] w-[72px] rounded-full text-white font-title-md mx-auto" onclick="pressKey('6')">6</button>
<button class="keypad-button h-[72px] w-[72px] rounded-full text-white font-title-md mx-auto" onclick="pressKey('7')">7</button>
<button class="keypad-button h-[72px] w-[72px] rounded-full text-white font-title-md mx-auto" onclick="pressKey('8')">8</button>
<button class="keypad-button h-[72px] w-[72px] rounded-full text-white font-title-md mx-auto" onclick="pressKey('9')">9</button>
<!-- Bottom Row -->
<div class="h-[72px] w-[72px] mx-auto flex items-center justify-center">
<span class="font-label-md text-on-surface-variant uppercase tracking-widest cursor-pointer hover:text-white transition-colors">Help</span>
</div>
<button class="keypad-button h-[72px] w-[72px] rounded-full text-white font-title-md mx-auto" onclick="pressKey('0')">0</button>
<button class="keypad-button h-[72px] w-[72px] rounded-full text-white mx-auto" onclick="pressKey('back')">
<span class="material-symbols-outlined text-[24px]">backspace</span>
</button>
</div>
<!-- Footer Security Message -->
<div class="mt-xl text-center space-y-xs">
<p class="font-label-md text-on-surface-variant flex items-center justify-center gap-xs">
<span class="material-symbols-outlined text-[14px]">lock</span>
            End-to-End Encrypted Tunnel Active
        </p>
<div class="w-16 h-1 bg-surface-container-highest rounded-full mx-auto mt-lg opacity-50"></div>
</div>
<!-- Atmosphere Effects -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden">
<!-- Subtle radial gradient to define depth -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px]"></div>
</div>
<script>
        let currentPin = "12"; // Mock state showing 2 filled dots as requested
        const maxLen = 4;

        function pressKey(val) {
            if (val === 'back') {
                currentPin = currentPin.slice(0, -1);
            } else if (currentPin.length < maxLen) {
                currentPin += val;
            }
            updateDots();
            
            if (currentPin.length === maxLen) {
                // Flash success/error simulation
                setTimeout(() => {
                    const dots = document.querySelectorAll('.pin-dot');
                    dots.forEach(d => d.style.borderColor = '#34A853');
                    setTimeout(() => {
                        currentPin = "";
                        updateDots();
                        dots.forEach(d => d.style.borderColor = '');
                    }, 500);
                }, 200);
            }
        }

        function updateDots() {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((dot, index) => {
                if (index < currentPin.length) {
                    dot.classList.add('filled');
                } else {
                    dot.classList.remove('filled');
                }
            });
        }
    </script>
