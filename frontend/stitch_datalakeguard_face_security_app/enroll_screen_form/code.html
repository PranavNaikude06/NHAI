<body class="flex flex-col h-screen overflow-hidden">
<!-- Top App Bar (Shared Component Strategy) -->
<header class="flex justify-between items-center w-full h-16 px-margin-mobile bg-surface-container dark:bg-surface-container border-b border-outline-variant dark:border-outline-variant z-50">
<div class="flex items-center gap-3">
<button aria-label="Back" class="flex items-center justify-center p-2 rounded-full hover:bg-surface-bright transition-all">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary dark:text-primary">Enroll New Worker</h1>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-on-surface-variant">account_circle</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto px-margin-mobile py-lg pb-32">
<!-- Hero Branding Section -->
<div class="mb-xl">
<div class="w-12 h-12 bg-primary-container rounded-xl flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-on-primary-container" style="font-variation-settings: 'FILL' 1;">person_add</span>
</div>
<p class="font-body-md text-on-surface-variant mb-xs">Identity Management</p>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-white">Personnel Onboarding</h2>
</div>
<!-- Form Section -->
<form class="space-y-md" id="enrollment-form">
<!-- Worker Name Input -->
<div class="security-card p-md rounded-xl">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="worker-name">WORKER NAME</label>
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-outline">badge</span>
<input class="w-full bg-transparent border-none p-0 text-on-surface focus:ring-0 font-body-lg text-body-lg placeholder:text-surface-variant" id="worker-name" placeholder="Full Legal Name" type="text"/>
</div>
</div>
<!-- Worker ID Input -->
<div class="security-card p-md rounded-xl">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="worker-id">WORKER ID</label>
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-outline">fingerprint</span>
<input class="w-full bg-transparent border-none p-0 text-on-surface focus:ring-0 font-mono-data text-mono-data placeholder:text-surface-variant" id="worker-id" placeholder="DLG-000-000" type="text"/>
</div>
</div>
<!-- Role Dropdown -->
<div class="security-card p-md rounded-xl">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="worker-role">ASSIGNED ROLE</label>
<div class="flex items-center gap-md relative">
<span class="material-symbols-outlined text-outline">verified_user</span>
<select class="w-full bg-transparent border-none p-0 text-on-surface focus:ring-0 font-body-lg text-body-lg appearance-none cursor-pointer" id="worker-role">
<option class="bg-surface-container-high" value="field-worker">Field Worker</option>
<option class="bg-surface-container-high" value="supervisor">Supervisor</option>
<option class="bg-surface-container-high" value="technician">Technician</option>
</select>
<span class="material-symbols-outlined text-outline absolute right-0 pointer-events-none">expand_more</span>
</div>
</div>
<!-- Status Indicator Card (Extra UI Polishing) -->
<div class="bg-surface-container-low p-md rounded-xl border-l-4 border-secondary flex items-start gap-md">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">info</span>
<div>
<p class="font-label-md text-label-md text-secondary">SECURITY PROTOCOL</p>
<p class="font-body-md text-body-md text-on-surface-variant">Biometric capture is required for all new technician and supervisor roles to access secure vaults.</p>
</div>
</div>

<div class="absolute bottom-md left-md flex items-center gap-xs">
<span class="w-2 h-2 rounded-full bg-secondary animate-pulse"></span>
<span class="font-label-md text-label-md text-white">System Ready</span>
</div>
</div>
</form>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 w-full p-margin-mobile bg-gradient-to-t from-[#0A0A0A] to-transparent pointer-events-none">
<button class="pointer-events-auto w-full h-14 bg-primary-container text-on-primary-container rounded-full font-title-md text-title-md flex items-center justify-center gap-md active:scale-95 transition-transform duration-150 shadow-xl shadow-primary-container/20" id="camera-btn">
<span class="material-symbols-outlined">photo_camera</span>
            Start Camera Capture
        </button>
</div>
<!-- Micro-interaction Script -->
<script>
        const cameraBtn = document.getElementById('camera-btn');
        cameraBtn.addEventListener('click', () => {
            cameraBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Capturing...';
            setTimeout(() => {
                cameraBtn.innerHTML = '<span class="material-symbols-outlined text-secondary">check_circle</span> Capture Complete';
                cameraBtn.classList.remove('bg-primary-container');
                cameraBtn.classList.add('bg-secondary-container');
            }, 2000);
        });

        // Focus ring effect for inputs
        const inputs = document.querySelectorAll('input, select');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.closest('.security-card').style.borderColor = '#1A73E8';
            });
            input.addEventListener('blur', () => {
                input.closest('.security-card').style.borderColor = '#333333';
            });
        });
    </script>
</body></html>
