<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=390, height=844, initial-scale=1.0" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "on-secondary-container": "#003210",
                    "on-secondary-fixed": "#002108",
                    "inverse-primary": "#005bc0",
                    "surface-container-highest": "#353534",
                    "surface-container-lowest": "#0e0e0e",
                    "error-container": "#93000a",
                    "background": "#131313",
                    "error": "#ffb4ab",
                    "inverse-on-surface": "#313030",
                    "primary-fixed": "#d8e2ff",
                    "inverse-surface": "#e5e2e1",
                    "on-tertiary-fixed": "#261a00",
                    "surface-container-low": "#1c1b1b",
                    "surface-tint": "#adc7ff",
                    "on-tertiary": "#402d00",
                    "on-secondary": "#003914",
                    "on-primary-container": "#ffffff",
                    "tertiary-fixed-dim": "#fbbc05",
                    "on-surface": "#e5e2e1",
                    "surface-container": "#201f1f",
                    "surface-variant": "#353534",
                    "tertiary-container": "#987000",
                    "tertiary": "#fbbc05",
                    "outline-variant": "#414754",
                    "primary": "#adc7ff",

                    "secondary-fixed-dim": "#6ddd81",
                    "on-secondary-fixed-variant": "#005320",
                    "on-primary-fixed": "#001a41",

                    "surface-bright": "#3a3939",
                    "on-tertiary-container": "#ffffff",
                    "outline": "#8b909f",
                    "primary-container": "#1a73e8",
                    "secondary-container": "#30a550",
                    "on-error-container": "#ffdad6",
                    "secondary-fixed": "#89fa9b",

                    "on-error": "#690005",

                    "xl": "0.75rem",

            },
            "spacing": {

                    "xl": "32px",
                    "gutter": "16px",
                    "sm": "12px",
                    "md": "16px",
                    "base": "8px"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "mono-data": ["JetBrains Mono"],
                    "headline-lg": ["Inter"],

            "fontSize": {
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "mono-data": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                    "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],

                    "headline-xl": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}]

          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 48;
        }
        .rejection-bg {
            background-color: #EA4335;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background flex flex-col items-center justify-between min-h-screen overflow-hidden selection:bg-white/30">
<!-- Rejection Canvas -->
<main class="rejection-bg w-full h-full flex-grow flex flex-col items-center justify-center px-margin-mobile relative">
<!-- Animated Background Pulse (Subtle Atmosphere) -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] border border-white/10 rounded-full animate-ping opacity-20" id="pulse-ring"></div>
</div>
<!-- Identity Icon Section -->
<div class="relative mb-xl scale-110">
<div class="flex items-center justify-center w-32 h-32 rounded-full border-2 border-white/20">
<span class="material-symbols-outlined text-white text-[80px]" data-icon="face_retouching_off">
                    face_retouching_off
                </span>
</div>
<!-- Error Indicator Overlay -->
<div class="absolute -top-2 -right-2 bg-white text-[#EA4335] w-10 h-10 rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined font-bold text-2xl" data-icon="priority_high">
                    priority_high
                </span>
</div>
</div>
<!-- Feedback Content -->
<div class="text-center space-y-md z-10">
<h1 class="text-white font-headline-xl text-[36px] leading-[44px] tracking-tight font-bold">
                Face Not Recognized
            </h1>
<p class="text-white/80 font-title-md text-[18px] leading-[26px] max-w-[280px] mx-auto font-normal">
                Contact your supervisor to enroll
            </p>
</div>
<!-- Action Section -->
<div class="absolute bottom-16 w-full px-margin-mobile flex flex-col items-center space-y-lg">
<!-- Outline Button based on Style Guidance -->
<button class="w-full h-[56px] border-2 border-white rounded-full flex items-center justify-center text-white font-title-md hover:bg-white/10 active:scale-95 transition-all duration-200">
                Done
            </button>
<!-- Contextual Support Link -->
<button class="text-white/60 font-label-md uppercase tracking-widest text-[11px] hover:text-white transition-colors">
                Retry scan
            </button>
</div>
</main>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.querySelector('button');
            btn.addEventListener('touchstart', () => {
                btn.style.transform = 'scale(0.96)';
            });
            btn.addEventListener('touchend', () => {
                btn.style.transform = 'scale(1)';
            });

            // Gentle interaction for the icon
            const icon = document.querySelector('.material-symbols-outlined');
            window.addEventListener('deviceorientation', (event) => {
                const x = event.beta / 10;
                const y = event.gamma / 10;
                icon.style.transform = `translate(${y}px, ${x}px)`;
            });
        });
    </script>
</body></html>
