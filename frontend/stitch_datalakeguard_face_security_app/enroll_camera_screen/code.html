<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
    }
    .face-guide {
      clip-path: polygon(0% 0%, 0% 100%, 100% 100%, 100% 0%, 0% 0%, 50% 25%, 80% 50%, 50% 75%, 20% 50%, 50% 25%);
      mask: radial-gradient(ellipse 35% 45% at 50% 50%, transparent 99%, black 100%);
      -webkit-mask: radial-gradient(ellipse 35% 45% at 50% 50%, transparent 99%, black 100%);
    }
    @keyframes success-flash {
      0% { opacity: 0; background-color: transparent; }
      20% { opacity: 0.4; background-color: #34A853; }
      100% { opacity: 0; background-color: transparent; }
    }
    .flash-effect {
      animation: success-flash 0.8s ease-out forwards;
    }
    .camera-mesh {
        background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
        background-size: 24px 24px;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface-lowest text-on-surface overflow-hidden flex items-center justify-center min-h-screen">
<main class="relative w-[390px] h-[844px] bg-black overflow-hidden shadow-2xl flex flex-col">
<!-- Camera Feed Placeholder -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-60 grayscale-[0.2]" data-alt="A high-resolution close-up portrait of a person with neutral expression, positioned in the center of the frame. The lighting is soft and professional, with a modern corporate aesthetic and deep black background tones. Subtle teal and blue highlights reflect on the skin, suggesting a sophisticated biometric security environment. The style is ultra-modern and crisp." src="https://lh3.googleusercontent.com/aida-public/AB6AXuALswa2iEz4eaDDMg_w2MnkA_mLkYlotcQwqD_1ZM3JJ3kT32YjUg1muJ0GeQUfFQR3jS5gCegrA5EmKtrd-DLZQH_Xi4QRENG6IGQg24Tv0fvJvhH08TrHUetNAZBla9kjbx_sTgDc23-FyTU2jKKSglju0dz8dheWagDY7noClW_u-vqHy_-qpmK86Il1hz6UzjoYrLh30PtKsM738EM-4Sd1syHpqelil0KeQ6cHe8FgB2DMShzSpMgqkbcA9gYjRZBT9LMMBdE"/>

<div class="absolute inset-0 bg-gradient-to-b from-transparent via-primary/5 to-transparent opacity-30 h-1/4 animate-pulse"></div>
<!-- Camera Mesh Texture -->
<div class="absolute inset-0 camera-mesh"></div>
</div>
<!-- Capture Flash Overlay -->
<div class="absolute inset-0 z-50 pointer-events-none" id="flash"></div>
<!-- Top App Bar & Progress (Shared Component Identity) -->
<header class="relative z-20 flex flex-col pt-12 px-margin-mobile gap-lg">
<div class="flex items-center justify-between">
<button class="p-2 bg-surface-container/60 backdrop-blur-md rounded-full text-on-surface hover:bg-surface-bright transition-all">
<span class="material-symbols-outlined">close</span>
</button>
<div class="flex flex-col items-center">
<span class="font-headline-lg-mobile text-headline-lg-mobile text-white font-bold tracking-tight">Frame 2 of 5</span>
<span class="font-label-md text-label-md text-primary/80 uppercase tracking-widest mt-xs">Biometric Enrollment</span>
</div>
<button class="p-2 bg-surface-container/60 backdrop-blur-md rounded-full text-on-surface hover:bg-surface-bright transition-all">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
<!-- Progress Indicators -->
<div class="flex justify-center items-center gap-sm">
<div class="w-2.5 h-2.5 rounded-full bg-secondary shadow-[0_0_8px_rgba(109,221,129,0.5)]"></div>
<div class="w-2.5 h-2.5 rounded-full bg-secondary shadow-[0_0_8px_rgba(109,221,129,0.5)]"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-variant border border-outline-variant"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-variant border border-outline-variant"></div>

<!-- Center Mask & Face Guide -->

</div>
<!-- Darkened Exterior (The Hole) -->

</div>
<!-- Instruction Text -->
<div class="mt-auto relative z-20 px-xl pb-32 flex flex-col items-center gap-sm text-center">
<div class="bg-surface-container/80 backdrop-blur-lg border border-outline-variant/30 rounded-xl px-lg py-md">
<p class="font-body-lg text-body-lg text-white font-medium">Keep your head centered and stay still.</p>
<p class="font-label-md text-label-md text-on-surface-variant mt-xs">Face detection active...</p>
</div>
</div>
<!-- Bottom Controls -->
<div class="absolute bottom-0 left-0 w-full z-30 px-margin-mobile pb-12 flex items-center justify-between bg-gradient-to-t from-black via-black/80 to-transparent pt-20">

</div>
<!-- Capture Button -->
<button class="w-20 h-20 rounded-full bg-white flex items-center justify-center border-4 border-white/20 active:scale-90 transition-transform duration-150" id="capture-btn">
<div class="w-16 h-16 rounded-full border-2 border-black flex items-center justify-center">
<div class="w-14 h-14 rounded-full bg-white"></div>
</div>
</button>
<div class="w-12 h-12 flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-[28px]">cameraswitch</span>
</div>
</div>
<!-- Interactive Layer -->
<script>
        const btn = document.getElementById('capture-btn');
        const flash = document.getElementById('flash');

        btn.addEventListener('click', () => {
            // Trigger Flash
            flash.classList.remove('flash-effect');
            void flash.offsetWidth; // Trigger reflow
            flash.classList.add('flash-effect');

            // Haptic Feedback Simulation (console)
            console.log('Capture biometric frame...');
        });

        // Atmospheric scan effect
        document.addEventListener('mousemove', (e) => {
            const guide = document.querySelector('.w-\\[280px\\]');
            const rect = guide.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const deltaX = (e.clientX - centerX) / 100;
            const deltaY = (e.clientY - centerY) / 100;
            
            guide.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
        });
    </script>
