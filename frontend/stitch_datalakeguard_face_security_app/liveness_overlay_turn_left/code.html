<div class="absolute bottom-4 right-4 w-6 h-6 border-b-2 border-r-2 border-outline/50 z-30"></div>

<script>
        // Micro-interaction for simulated progress
        const progressBar = document.querySelector('.bg-tertiary');
        const progressText = document.querySelector('.text-tertiary.font-bold');
        let progress = 65;

        setInterval(() => {
            progress = Math.min(100, progress + (Math.random() * 0.5));
            progressBar.style.width = `${progress}%`;
            progressText.innerText = `${Math.floor(progress)}%`;
            
            if(progress >= 100) progress = 65; // Reset for demo loop
        }, 100);

        // Subtle parallax on guide based on mouse (or touch) move to simulate liveness
        const container = document.querySelector('.w-\\[390px\\]');
        const guide = document.querySelector('.oval-guide');
        
        container.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width - 0.5;
            const y = (e.clientY - rect.top) / rect.height - 0.5;
            
            guide.style.transform = `translate(${x * 10}px, ${y * 10}px)`;
        });
    </script>
