<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "surface-dim": "#131313",
                "primary-fixed-dim": "#adc7ff",
                "on-primary": "#002e68",
                "on-primary-fixed-variant": "#004493",
                "on-surface-variant": "#c1c6d6",
                "surface-container-high": "#2a2a2a",
                "on-secondary-container": "#003210",
                "on-secondary-fixed": "#002108",
                "inverse-primary": "#005bc0",
                "surface-container-highest": "#353534",
                "surface-container-lowest": "#0e0e0e",
                "error-container": "#93000a",
                "background": "#0A0A0A",
                "error": "#ffb4ab",
                "inverse-on-surface": "#313030",
                "primary-fixed": "#d8e2ff",
                "inverse-surface": "#e5e2e1",
                "on-tertiary-fixed": "#261a00",
                "surface-container-low": "#1c1b1b",
                "surface-tint": "#adc7ff",
                "on-tertiary": "#402d00",
                "on-secondary": "#003914",
                "on-primary-container": "#ffffff",
                "tertiary-fixed-dim": "#fbbc05",
                "on-surface": "#e5e2e1",
                "surface-container": "#201f1f",
                "surface-variant": "#353534",
                "tertiary-container": "#987000",
                "tertiary": "#fbbc05",
                "outline-variant": "#414754",
                "primary": "#adc7ff",
                "on-background": "#e5e2e1",
                "secondary-fixed-dim": "#6ddd81",
                "on-secondary-fixed-variant": "#005320",
                "on-primary-fixed": "#001a41",
                "on-tertiary-fixed-variant": "#5c4300",
                "surface-bright": "#3a3939",
                "on-tertiary-container": "#ffffff",
                "outline": "#8b909f",
                "primary-container": "#1a73e8",
                "secondary-container": "#30a550",
                "on-error-container": "#ffdad6",
                "secondary-fixed": "#89fa9b",
                "surface": "#131313",
                "secondary": "#6ddd81",
                "on-error": "#690005",
                "tertiary-fixed": "#ffdfa0"

            "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",

                "full": "9999px"

            "spacing": {
                "xs": "4px",
                "lg": "24px",
                "margin-mobile": "20px",
                "xl": "32px",
                "gutter": "16px",
                "sm": "12px",
                "md": "16px",
                "base": "8px"
            },
            "fontFamily": {
                "body-md": ["Inter"],
                "mono-data": ["JetBrains Mono"],
                "headline-lg": ["Inter"],
                "title-md": ["Inter"],

        }
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .glow-effect {
            box-shadow: 0 0 40px 10px rgba(26, 115, 232, 0.15);
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        .animate-pulse-slow {
            animation: pulse-slow 4s ease-in-out infinite;
        }
        .scan-line {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #1a73e8, transparent);
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 3s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface flex items-center justify-center min-h-screen overflow-hidden">
<!-- Splash Canvas (390x844 Mobile Perspective) -->
<main class="relative w-full max-w-[390px] h-full min-h-screen flex flex-col items-center justify-between py-24 px-margin-mobile bg-[#0A0A0A]">
<!-- Top Spacer for balance -->
<div class="h-20"></div>
<!-- Center Identity Cluster -->
<div class="flex flex-col items-center gap-xl">
<!-- Animated Shield Logo Container -->
<div class="relative group">
<!-- Background Glow -->
<div class="absolute inset-0 bg-primary-container/20 blur-[60px] rounded-full animate-pulse-slow"></div>
<!-- Main Logo Icon -->
<div class="relative w-24 h-24 bg-surface-container-high rounded-full border border-outline-variant flex items-center justify-center glow-effect transition-all duration-700 hover:scale-105">
<span class="material-symbols-outlined text-[48px] text-primary-container" style="font-variation-settings: 'FILL' 1, 'wght' 200;">
                        shield_lock
                    </span>
<!-- Subtle Scanning Decorative Element -->
<div class="absolute inset-4 border border-primary-container/20 rounded-full overflow-hidden">
<div class="scan-line"></div>
</div>
</div>
</div>
<!-- Text Branding -->
<div class="flex flex-col items-center text-center gap-xs">
<h1 class="font-headline-xl text-headline-xl text-on-primary-container tracking-tight">
                    DatalakeGuard
                </h1>
<p class="font-label-md text-label-md text-[#9AA0A6] uppercase tracking-[0.2em]">
                    Face Authentication System
                </p>
</div>
</div>
<!-- Bottom Footer Section -->
<div class="flex flex-col items-center gap-lg w-full">
<!-- Loading Indicator -->
<div class="flex items-center gap-base">
<div class="w-1.5 h-1.5 rounded-full bg-primary-container animate-bounce [animation-delay:-0.3s]"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary-container animate-bounce [animation-delay:-0.15s]"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary-container animate-bounce"></div>
</div>
<!-- Security Badge -->
<div class="flex items-center gap-xs px-md py-xs bg-surface-container-low border border-outline-variant rounded-full">
<span class="material-symbols-outlined text-secondary-fixed-dim text-[16px]">verified_user</span>
<span class="font-label-md text-label-md text-on-surface-variant">End-to-End Encrypted</span>
</div>
</div>
<!-- Background Atmospheric Element (Subtle Gradient Grid) -->
<div class="absolute inset-0 pointer-events-none opacity-20" style="background-image: radial-gradient(#1a73e8 0.5px, transparent 0.5px); background-size: 24px 24px;"></div>
</main>
<!-- Transition Script -->
<script>
        // Simple micro-interaction for the splash screen
        document.addEventListener('DOMContentLoaded', () => {
            const logo = document.querySelector('.glow-effect');
            
            // Subtle hover effect simulation
            setInterval(() => {
                logo.style.transform = 'scale(1.02)';
                setTimeout(() => {
                    logo.style.transform = 'scale(1)';
                }, 2000);
            }, 4000);

            // In a real app, we would redirect here after initialization
            console.log("DatalakeGuard Initializing Security Environment...");
        });
    </script>
</body></html>
