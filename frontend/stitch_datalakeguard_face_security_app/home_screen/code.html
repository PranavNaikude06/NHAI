<style>
        body {
            background-color: #0A0A0A;
            color: #e5e2e1;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            width: 390px;
            height: 844px;
            margin: 0 auto;
            position: relative;
        }
        .scanner-glow {
            background: radial-gradient(circle, rgba(26, 115, 232, 0.15) 0%, rgba(10, 10, 10, 0) 70%);
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #1a73e8, transparent);
            box-shadow: 0 0 15px #1a73e8;
            animation: scan 3s ease-in-out infinite;
        }
        @keyframes scan {
            0%, 100% { transform: translateY(0); opacity: 0; }
            10%, 90% { opacity: 1; }
            50% { transform: translateY(240px); }
        }
        .atmospheric-particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.1;
            pointer-events: none;
        }
    </style>

<body class="flex flex-col antialiased">
<!-- Atmospheric Layer -->
<div class="absolute inset-0 overflow-hidden" id="particles-container"></div>
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full h-16 px-margin-mobile bg-surface-container dark:bg-surface-container border-b border-outline-variant dark:border-outline-variant z-10">
<div class="flex items-center gap-base">
<span class="material-symbols-outlined text-primary dark:text-primary" data-icon="shield_lock" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary dark:text-primary">DatalakeGuard</h1>
</div>
<button class="material-symbols-outlined text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-bright dark:hover:bg-surface-bright p-2 rounded-full scale-95 transition-transform duration-200" data-icon="account_circle">account_circle</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-mobile relative">
<!-- Status Indicator -->
<div class="mb-xl flex items-center gap-xs bg-surface-container-low px-md py-xs rounded-full border border-outline-variant">
<span class="w-2 h-2 rounded-full bg-secondary shadow-[0_0_8px_#6ddd81]"></span>
<span class="font-label-md text-label-md text-secondary uppercase tracking-widest">System Armed</span>
</div>
<!-- Face Scan Illustration Container -->
<div class="relative w-64 h-64 flex items-center justify-center rounded-3xl border border-outline-variant/30 scanner-glow mb-xl group overflow-hidden">
<div class="absolute inset-0 flex items-center justify-center opacity-40">
<div class="w-48 h-48 border-[1px] border-primary-fixed-dim/20 rounded-full border-dashed animate-[spin_10s_linear_infinite]"></div>
</div>
<!-- The "Icon" -->

<span class="material-symbols-outlined text-primary text-[120px] leading-none opacity-90 transition-all duration-500 group-hover:scale-105" data-icon="face_retouching_natural" style="font-variation-settings: 'FILL' 0;">face_retouching_natural</span>
<p class="font-mono-data text-mono-data text-primary/60 tracking-tighter">SCAN_READY_0X4493</p>
</div>
<!-- Scanning Animation -->
<div class="absolute top-8 left-4 right-4 z-20 scan-line"></div>
<!-- Corner Accents -->
<div class="absolute top-4 left-4 w-6 h-6 border-t-2 border-l-2 border-primary"></div>
<div class="absolute top-4 right-4 w-6 h-6 border-t-2 border-r-2 border-primary"></div>
<div class="absolute bottom-4 left-4 w-6 h-6 border-b-2 border-l-2 border-primary"></div>

</div>
<!-- Hero Text -->

<span class="font-label-md text-label-md">Settings</span>
</a>

<script>
        // Micro-interactions and background effects
        const container = document.getElementById('particles-container');
        const particleCount = 15;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'atmospheric-particle';
            
            const size = Math.random() * 2 + 1;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            
            resetParticle(particle);
            container.appendChild(particle);
            
            animateParticle(particle);
        }

        function resetParticle(p) {
            p.style.left = `${Math.random() * 100}%`;
            p.style.top = `${Math.random() * 100}%`;
            p.style.opacity = Math.random() * 0.3;
        }

        function animateParticle(p) {
            const duration = Math.random() * 10000 + 5000;
            const targetX = (Math.random() - 0.5) * 100;
            const targetY = (Math.random() - 0.5) * 100;

            p.animate([
                { transform: 'translate(0, 0)', opacity: p.style.opacity },
                { transform: `translate(${targetX}px, ${targetY}px)`, opacity: 0 }
            ], {
                duration: duration,
                iterations: Infinity,
                easing: 'linear'
            });
        }

        // Simulating the "Backlight" press effect from design system
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => {
                if (btn.classList.contains('bg-surface-container')) {
                    btn.style.backgroundColor = '#2c2c2c';
                }
            });
            btn.addEventListener('mouseup', () => {
                if (btn.classList.contains('bg-surface-container')) {
                    btn.style.backgroundColor = '#201f1f';
                }
            });
        });
    </script>
