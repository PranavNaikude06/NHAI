<style>
    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="docked full-width top-0 bg-surface-container dark:bg-surface-container border-b border-outline-variant dark:border-outline-variant flex justify-between items-center w-full h-16 px-margin-mobile sticky z-40">
<div class="flex items-center gap-2">
<div class="flex items-center bg-surface-container-high rounded-full pl-2 pr-3 py-1 border border-outline-variant">
<span class="flex h-2 w-2 rounded-full bg-error mr-2 animate-pulse"></span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">OFFLINE</span>
</div>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary dark:text-primary">DatalakeGuard</h1>
<div class="scale-95 transition-transform duration-200 hover:bg-surface-bright dark:hover:bg-surface-bright p-2 rounded-full cursor-pointer">
<span class="material-symbols-outlined text-primary" data-icon="account_circle">account_circle</span>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow px-margin-mobile pt-lg pb-32">
<!-- Overview Section -->
<section class="mb-xl">
<div class="flex justify-between items-end mb-md">
<div>
<p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest mb-1">System Health</p>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Admin Dashboard</h2>
</div>
<div class="text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="refresh">refresh</span>
</div>
</div>
<!-- Stat Cards Grid -->
<div class="grid grid-cols-1 gap-md">
<!-- Card 1 -->
<div class="bg-[#1E1E1E] rounded-xl p-md border-l-4 border-primary-container flex justify-between items-center group transition-all duration-300 active:scale-[0.98]">
<div>
<p class="font-label-md text-label-md text-on-surface-variant">Enrolled Workers</p>
<p class="font-headline-xl text-headline-xl text-on-surface">12</p>
</div>
<div class="h-12 w-12 bg-surface-container-highest rounded-full flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="group">group</span>
</div>
</div>
<!-- Card 2 -->
<div class="bg-[#1E1E1E] rounded-xl p-md border-l-4 border-tertiary flex justify-between items-center group transition-all duration-300 active:scale-[0.98]">
<div>
<p class="font-label-md text-label-md text-on-surface-variant">Pending Sync Logs</p>
<p class="font-headline-xl text-headline-xl text-on-surface">47</p>
</div>
<div class="h-12 w-12 bg-surface-container-highest rounded-full flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined" data-icon="sync_problem">sync_problem</span>
</div>
</div>
<!-- Card 3 -->
<div class="bg-[#1E1E1E] rounded-xl p-md border-l-4 border-secondary flex justify-between items-center group transition-all duration-300 active:scale-[0.98]">
<div>
<p class="font-label-md text-label-md text-on-surface-variant">Last Sync</p>
<p class="font-title-md text-title-md text-on-surface mt-2">2h ago</p>
</div>
<div class="h-12 w-12 bg-surface-container-highest rounded-full flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="history">history</span>
</div>
</div>
</div>
</section>
<!-- Action Section -->
<section class="space-y-md">
<h3 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest px-1">Management Actions</h3>
<!-- Primary Action -->
<button class="w-full h-[56px] bg-[#1A73E8] text-white rounded-full font-title-md text-title-md flex items-center justify-center gap-3 transition-transform active:scale-95 security-glow">
<span class="material-symbols-outlined" data-icon="person_add">person_add</span>
                Enroll New Worker
            </button>
<!-- Secondary Actions -->
<div class="grid grid-cols-1 gap-md">
<button class="w-full h-[56px] bg-[#1E1E1E] text-white rounded-full border border-outline-variant font-title-md text-title-md flex items-center justify-center gap-3 transition-transform active:scale-95">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
                    View Sync Status
                </button>
<button class="w-full h-[56px] bg-[#1E1E1E] text-white rounded-full border border-outline-variant font-title-md text-title-md flex items-center justify-center gap-3 transition-transform active:scale-95">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
                    Settings
                </button>
</div>
</section>
<!-- Decorative Security Element -->
<div class="mt-xl opacity-20 flex justify-center">
<img alt="Security Logo" class="grayscale" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDtxL32wAb2JAxunv2gLsojpkYlD6Q-Ai_e9hsChO_o1nwJ_JdsC5g59lf1Lx8yZX9lUxfm5LTTZILoDyaMjTu9mU8ta6tpSTWoYvHaIVxkUkJX0E9FwwK3K9AWAAH9GLYiMnhbfLfryZ1PYgL6uyUufXGF795vz1d-SdsKbV6A-qs3copWufmMze0i6edwuq2FI_inGNoEBAtastMjZOapfsB6KTd6JcE3IItiYjTcCTFKSP8lZ6_o1SDiZ2S_M1Q3G5jyvxUjGuY"/>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full h-20 flex justify-around items-center px-gutter bg-surface-container border-t border-outline-variant dark:border-outline-variant z-50 rounded-t-xl">
<div class="flex flex-col items-center justify-center bg-primary-container dark:bg-primary-container text-on-primary-container dark:text-on-primary-container rounded-full px-4 py-1 scale-95 transition-all duration-150">
<span class="material-symbols-outlined" data-icon="dashboard" style="font-variation-settings: 'FILL' 1;">dashboard</span>
<span class="font-label-md text-label-md">Dashboard</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-4 py-1 hover:text-primary dark:hover:text-primary">
<span class="material-symbols-outlined" data-icon="lock">lock</span>
<span class="font-label-md text-label-md">Vault</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-4 py-1 hover:text-primary dark:hover:text-primary">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-label-md text-label-md">Logs</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-4 py-1 hover:text-primary dark:hover:text-primary">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-label-md text-label-md">Settings</span>
</div>
</nav>
<script>
        // Simple ripple-like feedback for buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', () => {
                button.classList.add('opacity-80');
                setTimeout(() => button.classList.remove('opacity-80'), 100);
            });
        });

        // Toggle visual offline warning animation
        const offlineBadge = document.querySelector('.animate-pulse');
        setInterval(() => {
            offlineBadge.style.opacity = offlineBadge.style.opacity === '0.5' ? '1' : '0.5';
        }, 1000);
    </script>
</body></html>
