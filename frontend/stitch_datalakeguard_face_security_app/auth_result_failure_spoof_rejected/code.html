            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

            animation: pulse-shake 0.4s ease-in-out;
        }
    </style>

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-dim text-on-surface antialiased overflow-hidden">
<!-- Failure Authentication Full Screen -->
<!-- The prompt specified a 390x844 layout with solid red #EA4335 background -->
<main class="relative h-screen w-screen failure-bg flex flex-col items-center justify-between px-margin-mobile pt-32 pb-12 overflow-hidden">
<!-- Header Branding (Suppressed Nav Shell as per instructions for Transactional/Failure screens) -->
<div class="absolute top-8 left-0 w-full flex justify-center opacity-40">
<span class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-white tracking-tight">DatalakeGuard</span>
</div>
<!-- Center Content -->
<div class="flex flex-col items-center text-center space-y-lg error-shake">
<!-- Icon Container -->
<div class="relative flex items-center justify-center w-32 h-32 rounded-full bg-white/10 backdrop-blur-sm border border-white/20">
<!-- Large X-mark with Shield Slash -->
<span class="material-symbols-outlined text-[80px] text-white leading-none" style="font-variation-settings: 'FILL' 0, 'wght' 200;">
                    shield_lock
                </span>
<div class="absolute inset-0 flex items-center justify-center">
<span class="material-symbols-outlined text-[96px] text-white font-bold leading-none opacity-90">
                        close
                    </span>
</div>
</div>
<!-- Failure Message -->
<div class="space-y-xs pt-4">
<!-- Specifically requested 36px bold white -->
<h1 class="text-[36px] font-bold text-white leading-tight px-4">
                    Liveness Check Failed
                </h1>
<!-- Specifically requested 18px lighter white -->
<p class="text-[18px] font-light text-white/80 max-w-[280px] mx-auto">
                    Please try again with your live face
                </p>
</div>
</div>
<!-- Action Footer -->
<div class="w-full space-y-md">
<!-- Specifically requested 'Try Again' button with white outline -->
<button class="btn-press w-full h-[56px] border-2 border-white rounded-full flex items-center justify-center text-white font-title-md text-title-md transition-all duration-200">
                Try Again
            </button>
<button class="w-full py-4 text-white/60 font-label-md text-label-md uppercase tracking-widest hover:text-white transition-colors duration-200">
                Contact Support
            </button>
</div>
<!-- Background Decorative Elements (Atmospheric) -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none overflow-hidden -z-10">
<div class="absolute -top-1/4 -left-1/4 w-[200%] h-[200%] opacity-10">
<div class="w-full h-full" style="background-image: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);"></div>
</div>
</div>
</main>
<script>
        // Micro-interaction for the "Try Again" button to simulate a refresh
        document.querySelector('button.border-white').addEventListener('click', function() {
            const container = document.querySelector('.error-shake');
            container.classList.remove('error-shake');
            void container.offsetWidth; // Trigger reflow
            container.classList.add('error-shake');
            
            // Visual feedback on press
            this.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span>';
            setTimeout(() => {
                this.innerHTML = 'Try Again';
            }, 800);
        });
    </script>
</body></html>
