<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Access Denied - DatalakeGuard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed": "#261a00",
                    "secondary-fixed": "#89fa9b",
                    "inverse-primary": "#005bc0",
                    "tertiary-fixed-dim": "#fbbc05",
                    "primary-container": "#1a73e8",
                    "on-surface-variant": "#c1c6d6",
                    "surface-container": "#201f1f",
                    "secondary-container": "#30a550",
                    "primary-fixed-dim": "#adc7ff",
                    "on-secondary-fixed-variant": "#005320",
                    "on-secondary": "#003914",
                    "on-background": "#e5e2e1",
                    "surface": "#131313",
                    "on-primary-container": "#ffffff",
                    "tertiary-fixed": "#ffdfa0",
                    "on-secondary-container": "#003210",
                    "error-container": "#93000a",
                    "primary": "#adc7ff",
                    "on-primary": "#002e68",
                    "surface-tint": "#adc7ff",
                    "on-tertiary-fixed-variant": "#5c4300",
                    "surface-container-low": "#1c1b1b",
                    "on-error": "#690005",
                    "tertiary": "#fbbc05",
                    "surface-container-highest": "#353534",
                    "on-tertiary-container": "#ffffff",
                    "background": "#131313",
                    "secondary-fixed-dim": "#6ddd81",
                    "inverse-on-surface": "#313030",
                    "surface-bright": "#3a3939",
                    "surface-dim": "#131313",
                    "inverse-surface": "#e5e2e1",
                    "surface-variant": "#353534",
                    "secondary": "#6ddd81",
                    "primary-fixed": "#d8e2ff",
                    "on-primary-fixed-variant": "#004493",
                    "on-primary-fixed": "#001a41",
                    "outline-variant": "#414754",
                    "surface-container-lowest": "#0e0e0e",
                    "on-surface": "#e5e2e1",
                    "on-secondary-fixed": "#002108",
                    "outline": "#8b909f",
                    "surface-container-high": "#2a2a2a",
                    "on-tertiary": "#402d00",
                    "tertiary-container": "#987000",
                    "error": "#ffb4ab",
                    "on-error-container": "#ffdad6",
                    "security-red": "#EA4335"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xs": "4px",
                    "lg": "24px",
                    "xl": "32px",
                    "md": "16px",
                    "margin-mobile": "20px",
                    "sm": "12px",
                    "gutter": "16px",
                    "base": "8px"
            },
            "fontFamily": {
                    "label-md": ["Inter"],
                    "body-md": ["Inter"],
                    "title-md": ["Inter"],
                    "mono-data": ["JetBrains Mono"],
                    "headline-xl": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "body-lg": ["Inter"],
                    "headline-lg": ["Inter"]
            },
            "fontSize": {
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "title-md": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "mono-data": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                    "headline-xl": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-lg-mobile": ["20px", {"lineHeight": "28px", "fontWeight": "700"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 48;
        }
        .security-pulse {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.2; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }
        .bg-security-red { background-color: #EA4335; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-security-red min-h-screen flex flex-col text-white antialiased overflow-hidden">
<!-- Header Shell (Suppressed for focused task, but keeping identity) -->
<header class="flex justify-between items-center w-full h-16 px-margin-mobile">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-white text-[24px]">shield_lock</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile font-bold tracking-tight">DatalakeGuard</span>
</div>
<span class="material-symbols-outlined text-white text-[24px]">account_circle</span>
</header>
<!-- Main Rejection Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile relative">
<!-- Decorative Background Element -->
<div class="absolute inset-0 pointer-events-none flex items-center justify-center opacity-10">
<div class="w-96 h-96 rounded-full border-4 border-white security-pulse"></div>
</div>
<!-- Central Status Icon -->
<div class="relative z-10 mb-xl flex flex-col items-center">
<div class="w-32 h-32 rounded-full border-2 border-white/30 flex items-center justify-center mb-lg">
<span class="material-symbols-outlined text-white text-[80px]" style="font-variation-settings: 'wght' 100;">
                    person_search
                </span>
</div>
<!-- Headline -->
<h1 class="font-headline-xl text-[36px] leading-[44px] text-center font-bold mb-md">
                Face Not Recognized
            </h1>
<!-- Subtext -->
<p class="font-body-lg text-white/80 text-center max-w-[280px]">
                Contact your supervisor to enroll this identity in the vault.
            </p>
</div>
<!-- System Status Indicator (Micro-detail for "Modern Corporate" look) -->
<div class="mt-lg flex items-center gap-2 px-md py-xs bg-black/10 rounded-full border border-white/10">
<span class="w-2 h-2 rounded-full bg-white animate-pulse"></span>
<span class="font-mono-data text-label-md uppercase tracking-widest text-white/70">Scanning Inhibited</span>
</div>
</main>
<!-- Footer Actions -->
<footer class="p-margin-mobile flex flex-col gap-md items-center pb-12">
<!-- Done Button -->
<button class="w-full h-12 rounded-full border border-white font-title-md text-white active:scale-95 transition-transform duration-200 hover:bg-white/10">
            Done
        </button>
<!-- Retry Scan Link -->
<button class="py-2 px-lg font-label-md tracking-widest uppercase text-white/90 hover:text-white transition-colors duration-200">
            RETRY SCAN
        </button>
</footer>
<!-- Interactive Layer: Simulated Scan Effect on Retry -->
<div class="fixed inset-0 bg-black z-[100] hidden flex-col items-center justify-center" id="scan-overlay">
<div class="w-64 h-64 border-2 border-primary rounded-xl relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1 bg-primary/80 shadow-[0_0_15px_#adc7ff] animate-scan"></div>
</div>
<p class="mt-lg font-mono-data text-primary animate-pulse">RE-INITIALIZING SENSORS...</p>
</div>
<style>
        @keyframes scan-move {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }
        .animate-scan {
            animation: scan-move 2s ease-in-out infinite;
        }
    </style>
<script>
        // Simple micro-interaction for the "RETRY SCAN"
        document.querySelector('button:last-child').addEventListener('click', () => {
            const overlay = document.getElementById('scan-overlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            
            setTimeout(() => {
                overlay.classList.add('hidden');
                overlay.classList.remove('flex');
                // Could trigger a toast or vibration here
            }, 3000);
        });

        // Haptic feedback simulation for the "Done" button
        document.querySelector('button:first-of-type').addEventListener('click', () => {
            document.body.style.opacity = '0.5';
            setTimeout(() => {
                window.location.reload(); // Simulate going back/resetting
            }, 300);
        });
    </script>
</body></html>
